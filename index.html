<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Точная погода</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .search-box button {
            padding: 15px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            white-space: nowrap;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        .search-box button:active {
            transform: scale(0.95);
        }

        .geo-btn {
            width: 100%;
            padding: 15px;
            background: #f0f0f0;
            border: 2px dashed #999;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
            color: #555;
        }

        .geo-btn:hover {
            background: #e8e8e8;
            border-color: #667eea;
        }

        .weather-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            padding: 25px;
            display: none;
            animation: fadeIn 0.5s;
        }

        .weather-card.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .weather-city {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .weather-temp {
            font-size: 64px;
            font-weight: 700;
            color: #333;
            margin: 10px 0;
        }

        .weather-temp span {
            font-size: 32px;
            color: #666;
        }

        .weather-desc {
            font-size: 18px;
            color: #555;
            margin-bottom: 15px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .weather-detail {
            background: rgba(255, 255, 255, 0.7);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .weather-detail .label {
            font-size: 12px;
            color: #777;
            text-transform: uppercase;
            font-weight: 600;
        }

        .weather-detail .value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-top: 4px;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 40px 0;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            display: none;
            margin-bottom: 15px;
        }

        .error.active {
            display: block;
        }

        .icon {
            font-size: 64px;
            text-align: center;
            margin: 10px 0;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }

        .weather-extra {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .weather-extra-item {
            text-align: center;
        }

        .weather-extra-item .label {
            font-size: 11px;
            color: #888;
        }

        .weather-extra-item .value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-top: 3px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            .weather-temp {
                font-size: 48px;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .search-box button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌤️ Точная погода</h1>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Введите город..." />
            <button onclick="getWeather()">Найти</button>
        </div>
        
        <button class="geo-btn" onclick="getGeoWeather()">📍 Моя геолокация</button>
        
        <div class="error" id="error"></div>
        
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #666;">Загрузка данных...</p>
        </div>
        
        <div class="weather-card" id="weatherCard">
            <div class="icon" id="weatherIcon">🌤️</div>
            <div class="weather-city" id="cityName">Москва</div>
            <div class="weather-temp" id="temperature">25<span>°C</span></div>
            <div class="weather-desc" id="description">Ясно</div>
            <div class="weather-details">
                <div class="weather-detail">
                    <div class="label">💨 Ветер</div>
                    <div class="value" id="wind">5 м/с</div>
                </div>
                <div class="weather-detail">
                    <div class="label">💧 Влажность</div>
                    <div class="value" id="humidity">60%</div>
                </div>
                <div class="weather-detail">
                    <div class="label">📊 Давление</div>
                    <div class="value" id="pressure">750 мм</div>
                </div>
                <div class="weather-detail">
                    <div class="label">🌡️ Ощущается</div>
                    <div class="value" id="feelsLike">24°C</div>
                </div>
            </div>
            <div class="weather-extra">
                <div class="weather-extra-item">
                    <div class="label">🌅 Восход</div>
                    <div class="value" id="sunrise">--:--</div>
                </div>
                <div class="weather-extra-item">
                    <div class="label">🌇 Закат</div>
                    <div class="value" id="sunset">--:--</div>
                </div>
                <div class="weather-extra-item">
                    <div class="label">☀️ УФ-индекс</div>
                    <div class="value" id="uvIndex">--</div>
                </div>
            </div>
        </div>
        
        <div class="footer">Данные: wttr.in • Обновлено: <span id="updateTime"></span></div>
    </div>

    <script>
        // Функция получения точной погоды с wttr.in
        async function getWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError('Введите название города');
                return;
            }
            
            showLoader(true);
            hideError();
            
            try {
                // Запрос к wttr.in (бесплатный API без ключа)
                const url = `https://wttr.in/${encodeURIComponent(city)}?format=j1&lang=ru`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('Город не найден');
                }
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error('Город не найден');
                }
                
                displayWeather(data);
                showLoader(false);
            } catch (error) {
                showError(error.message || 'Ошибка получения данных');
                showLoader(false);
            }
        }

        // Функция получения погоды по геолокации
        function getGeoWeather() {
            if (!navigator.geolocation) {
                showError('Геолокация не поддерживается');
                return;
            }
            
            showLoader(true);
            hideError();
            
            navigator.geolocation.getCurrentPosition(
                async function(position) {
                    const { latitude, longitude } = position.coords;
                    
                    try {
                        const url = `https://wttr.in/${latitude},${longitude}?format=j1&lang=ru`;
                        const response = await fetch(url);
                        
                        if (!response.ok) {
                            throw new Error('Не удалось получить данные');
                        }
                        
                        const data = await response.json();
                        displayWeather(data);
                        showLoader(false);
                    } catch (error) {
                        showError('Ошибка получения данных по геолокации');
                        showLoader(false);
                    }
                },
                function(error) {
                    showError('Не удалось определить геолокацию');
                    showLoader(false);
                }
            );
        }

        // Отображение погоды
        function displayWeather(data) {
            try {
                const current = data.current_condition[0];
                const location = data.nearest_area[0];
                const weather = data.weather[0];
                
                // Город
                const cityName = location.areaName[0].value || 'Неизвестно';
                document.getElementById('cityName').textContent = cityName;
                
                // Температура
                const temp = current.temp_C || '--';
                document.getElementById('temperature').innerHTML = temp + '<span>°C</span>';
                
                // Ощущается как
                const feelsLike = current.FeelsLikeC || temp;
                document.getElementById('feelsLike').textContent = feelsLike + '°C';
                
                // Описание
                const desc = current.weatherDesc[0].value || '---';
                document.getElementById('description').textContent = desc;
                
                // Ветер
                const windSpeed = current.windSpeedKmph || '0';
                document.getElementById('wind').textContent = windSpeed + ' км/ч';
                
                // Влажность
                const humidity = current.humidity || '0';
                document.getElementById('humidity').textContent = humidity + '%';
                
                // Давление
                const pressure = current.pressure || '0';
                document.getElementById('pressure').textContent = pressure + ' мм';
                
                // Иконка погоды
                const weatherCode = current.weatherCode || '113';
                document.getElementById('weatherIcon').textContent = getWeatherIcon(weatherCode);
                
                // Восход и закат
                if (weather.astronomy && weather.astronomy.length > 0) {
                    document.getElementById('sunrise').textContent = weather.astronomy[0].sunrise || '--:--';
                    document.getElementById('sunset').textContent = weather.astronomy[0].sunset || '--:--';
                }
                
                // UV-индекс
                const uvIndex = current.uvIndex || '--';
                document.getElementById('uvIndex').textContent = uvIndex;
                
                // Время обновления
                document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
                
                // Показываем карточку
                document.getElementById('weatherCard').classList.add('active');
                
            } catch (error) {
                showError('Ошибка обработки данных');
            }
        }

        // Функция получения иконки погоды по коду
        function getWeatherIcon(code) {
            const icons = {
                '113': '☀️', // Ясно
                '116': '⛅', // Переменная облачность
                '119': '☁️', // Облачно
                '122': '☁️', // Пасмурно
                '143': '🌫️', // Туман
                '176': '🌦️', // Легкий дождь
                '179': '🌨️', // Легкий снег
                '182': '🌧️', // Снег с дождем
                '185': '🌧️', // Снег с дождем
                '200': '⛈️', // Гроза
                '227': '🌨️', // Снегопад
                '230': '❄️', // Сильный снегопад
                '248': '🌫️', // Туман
                '260': '🌫️', // Туман
                '263': '🌦️', // Легкий дождь
                '266': '🌧️', // Легкий дождь
                '281': '🌧️', // Дождь
                '284': '🌧️', // Сильный дождь
                '293': '🌦️', // Легкий дождь
                '296': '🌧️', // Дождь
                '299': '🌧️', // Сильный дождь
                '302': '🌧️', // Сильный дождь
                '305': '🌧️', // Сильный дождь
                '308': '🌧️', // Проливной дождь
                '311': '🌧️', // Дождь
                '314': '🌧️', // Дождь
                '317': '🌧️', // Дождь
                '320': '🌨️', // Снег
                '323': '🌨️', // Снег
                '326': '🌨️', // Снег
                '329': '🌨️', // Снег
                '332': '❄️', // Сильный снег
                '335': '❄️', // Сильный снег
                '338': '❄️', // Сильный снег
                '350': '🌨️', // Снег
                '353': '🌦️', // Легкий дождь
                '356': '🌧️', // Дождь
                '359': '🌧️', // Дождь
                '362': '🌧️', // Дождь
                '365': '🌧️', // Дождь
                '368': '🌨️', // Снег
                '371': '❄️', // Сильный снег
                '374': '🌧️', // Дождь
                '377': '🌧️', // Дождь
                '386': '⛈️', // Гроза
                '389': '⛈️', // Сильная гроза
                '392': '⛈️', // Гроза со снегом
                '395': '❄️', // Сильный снег
            };
            return icons[code] || '🌤️';
        }

        // Показать ошибку
        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = '❌ ' + message;
            errorEl.classList.add('active');
            showLoader(false);
        }

        function hideError() {
            document.getElementById('error').classList.remove('active');
        }

        // Показать/скрыть загрузчик
        function showLoader(show) {
            document.getElementById('loader').classList.toggle('active', show);
            if (show) {
                document.getElementById('weatherCard').classList.remove('active');
            }
        }

        // Обработка Enter
        document.getElementById('cityInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                getWeather();
            }
        });

        // Загружаем погоду по умолчанию
        document.addEventListener('DOMContentLoaded', function() {
            // Показываем погоду в Москве при загрузке
            setTimeout(() => {
                document.getElementById('cityInput').value = 'Москва';
                getWeather();
            }, 300);
        });

        console.log('🌤️ Точная погода загружена!');
    </script>
</body>
</html>
