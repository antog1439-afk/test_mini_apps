<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Музыкальный бот</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f8f9fa);
            color: var(--tg-theme-text-color, #000);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .artist-name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--tg-theme-hint-color, #e9ecef);
        }
        .info-label {
            color: var(--tg-theme-hint-color, #6c757d);
        }
        .info-value {
            font-weight: 500;
        }
        .album-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--tg-theme-hint-color, #e9ecef);
        }
        .album-title {
            font-weight: 600;
            font-size: 16px;
        }
        .album-year {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
            margin-top: 4px;
        }
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }
        .bio-text {
            line-height: 1.5;
            margin-top: 12px;
        }
        .genres {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .genre-tag {
            background: var(--tg-theme-bg-color, #e9ecef);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        .back-link {
            text-align: center;
            margin-top: 16px;
        }
        .back-link a {
            color: var(--tg-theme-button-color, #2481cc);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="content">
            <div style="text-align: center; padding: 40px;">
                <div style="font-size: 48px; margin-bottom: 16px;">🎵</div>
                <h2>Музыкальный бот</h2>
                <p style="margin-top: 12px; color: var(--tg-theme-hint-color, #6c757d);">
                    Напишите трек в боте, затем нажмите<br>
                    <strong>"Открыть в Mini App"</strong>
                </p>
                <button onclick="openBot()">🔍 Найти исполнителя</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Получаем данные из URL (если есть)
        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('data');
        
        if (dataParam) {
            try {
                const artist = JSON.parse(decodeURIComponent(dataParam));
                showArtistData(artist);
            } catch(e) {
                console.error('Ошибка:', e);
            }
        } else {
            // Показываем приветствие с данными пользователя
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center;">
                        <h2>👋 Привет, ${user.first_name}!</h2>
                        <p style="margin-top: 12px;">Найди исполнителя в боте,<br>чтобы увидеть альбомы здесь</p>
                        <button onclick="openBot()">🔍 Найти исполнителя</button>
                    </div>
                `;
            }
        }
        
        function showArtistData(artist) {
            const genresHtml = artist.genres && artist.genres.length > 0 
                ? `<div class="genres">${artist.genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}</div>`
                : '<span>—</span>';
            
            let albumsHtml = '';
            if (artist.albums && artist.albums.length > 0) {
                albumsHtml = '<div class="card"><h3>📀 Альбомы</h3>';
                artist.albums.forEach(album => {
                    albumsHtml += `
                        <div class="album-item">
                            <div class="album-title">${album.title}</div>
                            <div class="album-year">${album.year || 'Год неизвестен'} • ${album.track_count || '?'} треков</div>
                        </div>
                    `;
                });
                albumsHtml += '</div>';
            }
            
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <div class="artist-name">🎤 ${artist.name}</div>
                    <div class="info-row">
                        <span class="info-label">👥 Слушателей</span>
                        <span class="info-value">${artist.listeners || '—'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">🎵 Жанры</span>
                        <div class="info-value">${genresHtml}</div>
                    </div>
                    <div class="info-row">
                        <span class="info-label">💿 Альбомов</span>
                        <span class="info-value">${artist.albums_count || artist.albums?.length || '—'}</span>
                    </div>
                </div>
                ${albumsHtml}
                <div class="card">
                    <h3>📖 Биография</h3>
                    <div class="bio-text">${artist.bio_short || 'Нет биографии'}</div>
                </div>
                <button onclick="tg.openLink('${artist.yandex_link || 'https://music.yandex.ru'}')">🎵 Открыть в Яндекс.Музыке</button>
                <div class="back-link">
                    <a href="#" onclick="openBot()">← Назад к поиску</a>
                </div>
            `;
        }
        
        function openBot() {
            tg.openTelegramLink('https://t.me/lnmizic_bot');
        }
    </script>
</body>
</html>
